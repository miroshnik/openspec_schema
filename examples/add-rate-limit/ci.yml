# .github/workflows/spec-first.yml
# Minimal GitHub Actions skeleton for the spec-first gate.
#  - `gate` is the REQUIRED job: runs gate steps 1-5 (hard, mechanical). Mark it as a
#    required status check in branch protection (see project.md).
#  - `judge` is a SEPARATE, NON-REQUIRED job: runs the judge in print mode, posts suspects,
#    and uses continue-on-error so a non-deterministic verdict NEVER reds the shared build.
name: spec-first

on:
  pull_request:
    branches: [main]

jobs:
  # ── REQUIRED: the hard gate (steps 1-5) ──────────────────────────────────────
  gate:
    name: gate (required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The regression diff (step 4) needs the merge-base built spec from git, not the
          # archive delta — so fetch enough history to resolve it.
          fetch-depth: 0
      - name: Materialize merge-base for the regression baseline
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          # regression.ts reads openspec/specs/<cap>/spec.md at this SHA as the baseline:
          echo "MERGE_BASE=$(git merge-base "origin/${{ github.base_ref }}" HEAD)" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # `npm run gate` runs steps 1-5 in order, failing on the first red:
      #   1 check:suite (eslint + tsc + vitest)  2 org-integrity (skipped, none)
      #   3 check:coverage  4 check:regression (reads $MERGE_BASE, set above, for the baseline)
      #   5 openspec validate --strict
      # Step 6 (judge) is NOT in the required job — it is the separate job below.
      # (CI uses `npx` prefixes; project.md shows the bare forms assuming local bins on PATH —
      #  the same commands.)
      - name: Gate (steps 1-5)
        run: npm run check:suite && npm run check:coverage && npm run check:regression && npx openspec validate --strict

  # ── NON-REQUIRED: the judge (step 6), soft in CI ─────────────────────────────
  judge:
    name: judge (soft — never reds the build)
    runs-on: ubuntu-latest
    continue-on-error: true        # SOFT in CI: a non-deterministic verdict must not fail the build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Judge (print mode — post suspects)
        run: npx tsx scripts/judge.ts --mode=print --out judge-report.md
      - name: Post suspects as a PR annotation / artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: judge-report
          path: judge-report.md
