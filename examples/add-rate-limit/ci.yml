# .github/workflows/spec-first.yml
# Minimal GitHub Actions skeleton for the spec-first gate.
#  - `gate` is the ONE REQUIRED job: runs the gate's deterministic, MECHANICAL steps (no LLM —
#    cheap, reproducible, no API keys). Mark it as a required status check in branch protection
#    (see project.md). The judge is NOT a CI job — it is a local in-loop reviewer (hard-local);
#    the human ratifies at PR review.
#  - OPTIONAL add-on (not shipped by default): a team MAY add their own NON-REQUIRED
#    judge-annotation job (continue-on-error) if they want LLM suspects posted on PRs — but CI
#    stays deterministic and needs no API keys out of the box.
# The gate reads the CHANGE (the functional-spec delta + the standards/ records + test markers +
# git) and runs PRE-archive: a functional spec archives natively (requirements survive) and
# standards live in standards/ and are never archived.
name: spec-first

on:
  pull_request:
    branches: [main]

jobs:
  # ── REQUIRED: the hard gate ──────────────────────────────────────────────────
  gate:
    name: gate (required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The no-silent-scenario-drop diff needs the merge-base from git — the functional spec's
          # built form and the standards/ records as they were before this change — so fetch enough
          # history.
          fetch-depth: 0
      - name: Materialize merge-base for the preservation baseline
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          # preservation.ts reads the touched openspec/specs/<cap>/spec.md AND the standards/<name>.md
          # files at this SHA as the baseline:
          echo "MERGE_BASE=$(git merge-base "origin/${{ github.base_ref }}" HEAD)" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # `npm run gate` runs the gate steps in order, failing on the first red:
      #   1 check:suite (eslint + tsc + vitest)  2 org-integrity (skipped, none)
      #   3 check:standards (each standards/ record: governs+tier + a SHALL rule + conforms + violates)
      #   4 check:coverage  5 check:preservation (reads $MERGE_BASE, set above, for the baseline)
      #   6 openspec validate --strict (the functional spec delta only)
      # The judge is NOT a CI step — it is a local in-loop reviewer (hard-local) the authoring loop
      # runs; the human ratifies the un-mechanizable part at PR review.
      # (CI uses `npx` prefixes; project.md shows the bare forms assuming local bins on PATH —
      #  the same commands.)
      - name: Gate (mechanical steps — the required check)
        run: npm run check:suite && npm run check:standards && npm run check:coverage && npm run check:preservation && npx openspec validate --strict
