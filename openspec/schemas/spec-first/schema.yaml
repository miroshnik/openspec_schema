# openspec/schemas/spec-first/schema.yaml
#
# PRINCIPLE #0: the spec is the single source of truth; code, tests, checks, migrations, and
# docs are all projections of specs. On divergence the spec is authoritative and changes first.
# Everything below serves that rule.
#
# Forked from `spec-driven` — KEEP the fork's generated schema.yaml and just ADD the
# `judge` artifact below, plus set each artifact's `instruction:` to the spec-first
# guidance (the rows below show it). OpenSpec (verified 1.4.1) emits, per artifact, a
# `<template>` block ("Use this as the structure for your output file. Fill in the
# sections") AND a separate `<instruction>` block ("AI instructions for creating this
# artifact"). The HOW-TO guidance is the `instruction:`; the `template:` file stays a
# clean fill-in scaffold. The rows here show the FULL shape (real schemas carry
# version/description/template/instruction + an apply block) — don't overwrite your
# forked rows wholesale; they're illustrative, and the `instruction:` bodies are
# SUMMARIZED here for readability (full text in templates/_additions.md).

name: spec-first
version: 1
description: Spec-as-source-of-truth flow — capabilities + standards loop + gate + judge (hard-local / soft-CI)

artifacts:
  - id: proposal
    generates: proposal.md
    template: proposal.md            # clean scaffold; ADD the `## Affected surfaces & rollback` structure heading
    description: Change proposal (+ affected surfaces & rollback)
    requires: []
    instruction: |                   # SUMMARY — full text in templates/_additions.md
      State WHAT changes and WHY. Under `## Affected surfaces & rollback` list the
      surfaces this change touches (design retrieves the standards whose `governs:`
      scope covers them) and the rollback path.

  - id: specs
    generates: specs/**/*.md          # functional capability specs AND standards (governs:)
    template: spec.md                 # the fork emits spec.md (verified 1.4.1); reconcile if yours differs, or `schema validate` fails
    description: Capabilities and standards (every spec carries a mandatory test:)
    requires: [proposal]
    instruction: |                    # SUMMARY — full text in templates/_additions.md
      Every spec under specs/ is a capability. Two shapes, ONE mechanism, distinguished
      by a `governs:` field: FUNCTIONAL capability (a component's behavior — typed
      interface + Given/When/Then scenarios) when ABSENT; STANDARD (a cross-cutting rule
      — `### Requirement:` SHALL/MUST + conforms/violates scenarios; add a `## Decision
      Record` ADR + trailing `## Rationale log` if architectural) when PRESENT. Both obey
      the same hard contract: `## Purpose` + `## Requirements`, ≥1 SHALL/MUST requirement,
      ≥1 scenario. See templates/standard.md for the complete archive-safe standard shape.
      A test on EVERY spec; tiers are mechanical | judge (no escape hatch). If design's
      standards loop flagged a CREATE/REVISE, AUTHOR the standard spec/delta HERE — specs
      is where standards live; design only decided.
      #
      # Shared machine-read CORE — frontmatter ABOVE `## Purpose` (so archive preserves
      # it), fixed place, so the gate and design-retrieval find it regardless of body
      # shape. EXACTLY these fields, in this order (spec-first CONVENTIONS, not OpenSpec
      # fields — `validate --strict` tolerates unknown frontmatter, verified 1.4.1: a
      # spec carrying the CORE returns valid:true, 0 issues):
      #   test:     <ref to the test(s) that enforce/prove this spec — the coverage key; MANDATORY>
      #   tier:     mechanical | judge        # GATE-VERIFIED against what test: resolves to
      #   governs:  <scope>                   # STANDARDS ONLY — its PRESENCE marks a standard; ABSENT ⇒ functional
      #   adoption: legacy                    # OPTIONAL — presence exempts a pre-existing spec from coverage until first modified; OMIT on active specs
      # For a standard@mechanical the enforcer (e.g. the eslint/AST rule id like
      # `eslint-plugin-local/require-rate-limit`) is named in the TEST body and the spec
      # prose, NOT a frontmatter field — coverage keys on test: only. There is no separate
      # `check:` or `invariant:` field: the `### Requirement:` SHALL/MUST clause IS the
      # authoritative one-liner; binding is DERIVED (a clause binds IFF its test resolves).

  - id: design
    generates: design.md
    template: design.md              # clean scaffold
    description: Technical design + the standards loop (retrieve → comply/create/revise → resolve-then-author)
    requires: [proposal]
    instruction: |                   # SUMMARY — full text in templates/_additions.md
      Run the STANDARDS LOOP before/while designing. RETRIEVE the standards whose
      `governs:` matches the proposal's affected surfaces and apply them (retrieval is
      first-try efficiency; the gate is the backstop). For each cross-cutting decision:
      COMPLY (fits an existing standard), CREATE (ungoverned ground — IDENTIFY the new
      standard and specify its tier/test, + a Decision Record if architectural; design
      DECIDES, specs AUTHORS — writing the standard in design would invert #0; bias to
      FEW), or REVISE (in tension — decide the DELTA + justification; specs writes it and
      appends the Rationale log v2). Every CREATE/REVISE is surfaced for human sign-off at
      PR review — never self-merge a standards change. For each clause RECORD whether its
      test will be REUSED or newly AUTHORED; the full resolve-then-author mechanics live
      in tasks.

  - id: tasks
    generates: tasks.md
    template: tasks.md               # clean scaffold
    description: Tasks + tier + test-per-spec + migration + coverage + regression + continuous gate
    requires: [specs, design]
    instruction: |                   # SUMMARY — full text in templates/_additions.md
      SOURCE-FIRST (#0): check, test, code, migration are PROJECTIONS — to change
      behavior, amend the spec/scenario FIRST, then re-project. For every binding clause
      introduced or touched: RESOLVE its enforcer against existing project checks, else
      AUTHOR one at the correct TIER (mechanical = machine-checkable-at-all, the projection
      taking whatever form the stack uses for THAT scenario — unit/e2e/property/contract test,
      type-level check, runtime assertion, OR lint/AST rule (lint is just one option, not the
      default); behavioral → executable test, structural → static analysis; mechanize first;
      judge = focused review of the un-mechanizable part, hard locally / soft in CI);
      RESOLVE or AUTHOR its TEST (functional → tests for its scenarios; standard@mechanical
      → a test that the enforcer flags the violates example and passes the conforms one;
      standard@judge → register the runnable judge check) with a `@spec
      <capability>/<requirement>/<scenario>` traceability marker — one marker per scenario it
      projects (a conforms+violates check-test carries TWO); add a MIGRATION if a standard's
      contract breaks.
      #
      # COVERAGE: every spec TOUCHED by this change whose `test:` does not resolve to a
      # real wired-in test is declared-but-unenforced — fail. Per touched spec, every
      # `#### Scenario:` must have >=1 test carrying its per-scenario
      # `@spec <capability>/<requirement>/<scenario>` marker; a scenario with no projecting
      # test is declared-but-unprojected and FAILS (the faithful operationalization of
      # "tests are projections of scenarios", stricter than requirement-level linkage).
      # (Judge clauses covered by their registered judge check; `adoption: legacy` exempt
      # until first modified; audits the CHANGE, not the whole tree.)
      # REGRESSION: the gate runs the FULL existing suite (greening your own checks while
      # redding an existing one fails) and diffs each touched main spec's
      # requirement+scenario set against its merge-base baseline (from git, NOT the archive
      # delta) — a scenario gone without a `## REMOVED Requirements` delta is silent
      # regression, fail.
      # RE-APPLY-after-CREATE is a GATE SUB-CHECK, not just an author chore: a new spec's
      # FIRST (CREATE) archive rebuilds from the ADDED delta and DROPS its CORE/ADR/
      # rationale, stubbing Purpose "TBD" (1.4.1) — RE-APPLY them to
      # openspec/specs/<name>/spec.md and re-run; the gate FAILS if the built spec is
      # missing its CORE (test:), so a forgotten re-apply cannot silently pass coverage.
      # tier is GATE-VERIFIED: the gate asserts the declared tier matches what test:
      # resolves to (mechanical lint/AST/test ⇒ mechanical; registered judge run ⇒ judge)
      # and FAILS on mismatch.
      # GATE, CONTINUOUSLY: run the project gate (project.md; templates/gate.md) after each
      # task group — the full suite + coverage + regression + `validate --strict` + judge
      # (hard local, soft CI) — green as the last group.

  # ── OPTIONAL ─────────────────────────────────────────────────────────────────
  # The judge. Runs POST-apply (it judges the implemented diff); modeled as
  # requires:[tasks] because the DAG can't depend on the apply phase directly.
  # Re-runnable — regenerate each run. HARD locally (blocks closing a task with an
  # open suspect), SOFT in CI (posts suspects, never reds the build). The CI hard
  # gate stays external: mechanical checks + coverage + regression + `validate --strict`.
  - id: judge
    generates: judge-report.md
    template: judge.md
    description: The judge — required in-loop reviewer (hard local, soft CI); surfaces suspects, no CI verdict
    requires: [tasks]

# ── Reference templates (not artifacts; layered in at setup) ───────────────────
# templates/_additions.md — the FULL guidance prose set as the artifact `instruction:`
#                           fields above (capabilities & standards / standards loop /
#                           enforcement tasks / proposal), plus the small
#                           `## Affected surfaces & rollback` structure for proposal.md.
# templates/standard.md   — complete archive-safe shape for a STANDARD spec (+ ADR).
# templates/gate.md       — the gate block (the external mechanical checks), embedded by project.md.
# templates/governance.md — seed process standards (all-via-flow, branch-per-change, lifecycle).
# templates/project.md    — the project contract (gate + org-pin + branch-protection + adoption).
# NOTE: additive per-team CONSTRAINTS (e.g. "this team's proposals must include a rollback
# plan") belong in `config.rules` (per-artifact), distinct from the universal flow carried
# in instruction:/templates.
# NOTE: a forked schema's `template:` filenames MUST match the on-disk files (a fork may
# emit `spec.md` rather than `specs.md`); reconcile, or `openspec schema validate` fails.

# Implementation phase (inherited from the fork — shown for completeness).
apply:
  requires: [tasks]
  tracks: tasks.md
