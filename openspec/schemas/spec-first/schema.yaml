# openspec/schemas/spec-first/schema.yaml
#
# PRINCIPLE #0: the spec/standard is the single source of truth; code, tests, checks,
# migrations, and docs are all projections of it. On divergence the spec/standard is
# authoritative and changes first. Everything below serves that rule.
#
# Two durable artifacts carry the source of truth. A functional capability is a pure native
# OpenSpec spec at openspec/specs/<cap>/spec.md (## Purpose + ## Requirements with
# ### Requirement / #### Scenario); its `## ADDED Requirements` delta rebuilds the main spec on
# "openspec archive", and tests tie to scenarios via @spec markers. A standard is a self-contained
# record at top-level standards/<name>.md — OUTSIDE openspec/, a committed git file that archive
# does not touch — carrying `governs:`/`tier:` frontmatter, a `## Decision Record`, a `## Rule`,
# and a `## Rationale log`. The `standard` artifact generates ../../../standards/*.md; RETRIEVE
# and the gate read it; "openspec validate" does not.
#
# OpenSpec (verified 1.4.1) emits, per artifact, a `<template>` block ("Use this as the structure
# for your output file. Fill in the sections") AND a separate `<instruction>` block ("AI
# instructions for creating this artifact"). The HOW-TO guidance is the `instruction:`; the
# `template:` file stays a clean fill-in scaffold. The rows here show the FULL shape (real schemas
# carry version/description/template/instruction + an apply block); the `instruction:` bodies are
# SUMMARIZED here for readability (full text in templates/_additions.md).

name: spec-first
version: 1
description: Spec-as-source-of-truth flow — functional capabilities + standards-as-living-records + gate + judge (hard-local / soft-CI)

artifacts:
  - id: proposal
    generates: proposal.md
    template: proposal.md            # clean scaffold; ADD the `## Affected surfaces & rollback` structure heading
    description: Change proposal (+ affected surfaces & rollback)
    requires: []
    instruction: |                   # SUMMARY — full text in templates/_additions.md
      State WHAT changes and WHY. Under `## Affected surfaces & rollback` list the
      surfaces this change touches (design retrieves the standards whose `governs:`
      scope covers them) and the rollback path.

  - id: specs
    generates: specs/**/*.md          # FUNCTIONAL capability specs — pure native OpenSpec
    template: spec.md                 # the fork emits spec.md (verified 1.4.1); reconcile if yours differs, or `schema validate` fails
    description: Functional capabilities as PURE native OpenSpec specs (survive archive natively)
    requires: [proposal]
    instruction: |                    # SUMMARY — full text in templates/_additions.md
      A functional capability is a PURE native OpenSpec spec at openspec/specs/<cap>/spec.md:
      a `## Purpose` section + a `## Requirements` section with `### Requirement:` clauses
      (literal SHALL/MUST) each carrying ≥1 `#### Scenario:`. The spec survives "openspec archive"
      natively; the requirements ARE the durable record. A brand-new spec is archived with
      OpenSpec's own stubbed `## Purpose` ("TBD — update Purpose after archive") — filling it is
      OpenSpec's own native step (mention it lightly, don't build a step around it). Cross-cutting
      RULES do NOT live here — they are authored as standards/ records by the `standard` artifact
      (it reads design's standards-loop decision). specs holds behavior only.

  - id: design
    generates: design.md
    template: design.md              # clean scaffold
    description: Technical design + the standards loop (retrieve → comply/create/revise/defer)
    requires: [proposal]
    instruction: |                   # SUMMARY — full text in templates/_additions.md
      Run the STANDARDS LOOP before/while designing. RETRIEVE the standards whose `governs:`
      matches the proposal's affected surfaces by reading standards/ directly, and apply them
      (retrieval is first-try efficiency; the gate is the backstop). For each cross-cutting
      decision flag one of: COMPLY (fits an existing standard — no standards/ change), CREATE
      (ungoverned ground — name the new standard and decide its scope/tier; bias to FEW), REVISE
      (in tension — decide the DELTA + justification), or DEFER (looks cross-cutting, but bias-to-FEW
      says it is too early to standardize: one surface, not clearly a class yet — KEEP it LOCAL as
      the functional capability's own behavior/scenarios, and RECORD it as a standard CANDIDATE
      (a line in the proposal or design); PROMOTE later via CREATE + a migration when a second
      surface needs the same rule, or a reviewer flags it). A standard is a rule that has OUTGROWN
      one capability; until then it lives as spec behavior — you do not standardize on a hunch.
      design DECIDES; the `standard` artifact AUTHORS the standards/ record (writing the standard
      here would invert #0). Every CREATE/REVISE is surfaced for human sign-off at PR review —
      never self-merge a standards change. For each clause RECORD whether its test will be REUSED
      or newly AUTHORED; the full resolve-then-author mechanics live in tasks.

  - id: standard
    generates: ../../../standards/*.md   # TOP-LEVEL <repo>/standards/, OUTSIDE openspec/ — archive never touches it
    template: standard.md            # the self-contained standards/<name>.md shape
    description: Standards-as-living-records — author/update standards/<name>.md (CONDITIONAL; only when design flags CREATE/REVISE)
    requires: [design]
    instruction: |                   # SUMMARY — full text in templates/_additions.md
      CONDITIONAL — a no-op unless design's standards loop flagged CREATE or REVISE; on COMPLY
      no standards/ file changes. When it did: author/update a SELF-CONTAINED living file at
      standards/<name>.md (top-level, OUTSIDE openspec/, NOT an openspec spec, NEVER archived).
      The whole standard lives HERE, always visible: `--- governs: <scope> ; tier: mechanical |
      judge ---` frontmatter; `# <name>`; `## Decision Record` (ADR — Status / Context /
      Decision / Consequences / Alternatives considered); `## Rule` with `### Requirement: <name>`
      → "The system SHALL <normative clause; literal SHALL/MUST>" + `#### Scenario: conforms` and
      `#### Scenario: violates`; `## Rationale log` → dated entries `(<date>): …` (every REVISE
      appends a dated entry — never rewrite history). See templates/standard.md for the complete shape.
      Frontmatter is SAFE here (the file is never archived). RETRIEVE reads standards/ directly;
      the gate reads its scenarios for coverage. Standards are NOT validated by "openspec validate"
      (they are spec-first artifacts) — the gate validates them: `governs:` + `tier:` present, a
      rule with SHALL/MUST, a `conforms` scenario AND a `violates` scenario. Org-shared standards
      are a secondary copy-in bundle under standards/ (pin + integrity check), still local files.

  - id: tasks
    generates: tasks.md
    template: tasks.md               # clean scaffold
    description: Tasks (ONE pass) + tier + test-per-scenario + migration + coverage + regression + gate as the last group
    requires: [specs, design, standard]
    instruction: |                   # SUMMARY — full text in templates/_additions.md
      ONE PASS — author EVERYTHING here: functional-spec deltas + standards/ records + tests +
      checks + migration, in a single pass. SOURCE-FIRST (#0): check, test, code, migration are
      PROJECTIONS — to change behavior, amend the spec/scenario (or the standard's `## Rule`) FIRST,
      then re-project. For every binding clause introduced or touched: RESOLVE its enforcer against
      existing project checks, else AUTHOR one at the correct TIER (mechanical = machine-checkable-at-all,
      the projection taking whatever form the stack uses for THAT scenario — unit/e2e/property/
      contract test, type-level check, runtime assertion, OR lint/AST rule (lint is just one option,
      not the default); behavioral → executable test, structural → static analysis; mechanize first;
      judge = focused review of the un-mechanizable part, hard locally / soft in CI). RESOLVE or
      AUTHOR its TEST (functional scenario → a behavioral test; standard@mechanical → a test that
      the enforcer flags the `violates` example and passes the `conforms` one; standard@judge →
      register the runnable judge check) with a `@spec <capability-or-standard>/<requirement>/<scenario>`
      traceability marker — one marker per scenario it projects (a conforms+violates check-test
      carries TWO); add a MIGRATION if a standard's contract breaks.
      #
      # COVERAGE: reads the CHANGE — functional-spec deltas + the touched/created standards/ files +
      # test markers + git. Per touched functional spec AND per touched/created standard, every
      # `#### Scenario:` must have ≥1 test carrying its per-scenario
      # `@spec <capability-or-standard>/<requirement>/<scenario>` marker; a scenario with no
      # projecting test is declared-but-unprojected and FAILS (the faithful operationalization of
      # "tests are projections of scenarios", stricter than requirement-level linkage). Runs
      # PRE-archive — every input (deltas, standards/, tests, suite, git) exists then. Coverage =
      # scenario→test linkage; test STRENGTH is ratification's job. Judge clauses are covered by their
      # registered judge check. Coverage is CHANGE-SCOPED: untouched legacy specs are not audited
      # (touch one ⇒ spec + test it); a non-blocking `coverage --all` backlog report drives the
      # brownfield ratchet.
      # REGRESSION: the gate runs the FULL existing suite (greening your own checks while redding an
      # existing one fails) and diffs against the git MERGE-BASE — each touched functional spec's
      # built form (requirement+scenario set) and each standards/ file (plain git diff) — a scenario
      # gone without a `## REMOVED Requirements` delta (functional) or a Rationale-log-justified
      # removal (standard) is silent regression, fail.
      # tier is GATE-VERIFIED: the gate asserts a standard's declared tier matches what its `test:`
      # resolves to (mechanical lint/AST/test ⇒ mechanical; registered judge run ⇒ judge) and FAILS
      # on mismatch.
      # GATE, AS THE LAST GROUP: the LAST task group runs the project gate (project.md; templates/gate.md)
      # green — the full suite + coverage + regression + `validate --strict` (functional specs) + judge
      # (hard local, soft CI). The gate reads the CHANGE: deltas + standards/ + tests + suite + git —
      # everything exists pre-archive. THEN archive + merge is the FINISH (not a task group with work
      # after it): "openspec archive" merges the functional-spec deltas into openspec/specs/ and moves
      # the change to changes/archive/; standards/ files are committed git files (untouched by archive).
      # Merge is the finish.

  # ── OPTIONAL ─────────────────────────────────────────────────────────────────
  # The judge. Runs POST-apply (it judges the implemented diff); modeled as
  # requires:[tasks] because the DAG can't depend on the apply phase directly.
  # Re-runnable — regenerate each run. HARD locally (blocks closing a task with an
  # open suspect), SOFT in CI (posts suspects, never reds the build). The CI hard
  # gate stays external: mechanical checks + coverage + regression + `validate --strict`.
  - id: judge
    generates: judge-report.md
    template: judge.md
    description: The judge — required in-loop reviewer (hard local, soft CI); surfaces suspects + standard-candidates, no CI verdict
    requires: [tasks]

# ── Reference templates (not artifacts; layered in at setup) ───────────────────
# templates/_additions.md — the FULL guidance prose set as the artifact `instruction:`
#                           fields above (functional capabilities / standards loop / standards
#                           records / enforcement tasks / proposal), plus the small
#                           `## Affected surfaces & rollback` structure for proposal.md.
# templates/standard.md   — complete shape for a STANDARD record: the self-contained
#                           standards/<name>.md living file (frontmatter + ADR + Rule + Rationale log).
# templates/gate.md       — the gate block (the external mechanical checks), embedded by project.md.
# templates/governance.md — seed process standards (all-via-flow, branch-per-change, lifecycle) as standards/ records.
# templates/project.md    — the project contract (gate + org-pin + branch-protection + brownfield ratchet).
# NOTE: additive per-team CONSTRAINTS (e.g. "this team's proposals must include a rollback
# plan") belong in `config.rules` (per-artifact), distinct from the universal flow carried
# in instruction:/templates.
# NOTE: a forked schema's `template:` filenames MUST match the on-disk files (a fork may
# emit `spec.md` rather than `specs.md`); reconcile, or `openspec schema validate` fails.

# Implementation phase (inherited from the fork — shown for completeness).
apply:
  requires: [tasks]
  tracks: tasks.md
